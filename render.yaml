# Render.com — Native Node (FREE hay sleep, không khuyên cho Socket.IO)
# Xem DEPLOY.md: Fly.io / VPS / Railway Hobby ổn định hơn.

services:
  - type: web
    name: murder-clue
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
      - key: CORS_ORIGIN
        value: "*"
