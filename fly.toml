# fly.toml app configuration file generated for murder-clue on 2026-05-21T14:41:46+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'murder-clue'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile.fly'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
